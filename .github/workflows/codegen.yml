name: Move Codegen → Frontend

on:
  push:
    paths:
      - '.github/workflows/**'
      - 'move/**'
      - 'PROJECT_DESCRIPTION.md'
      - 'sui-codegen.config.ts'
  workflow_dispatch:

jobs:
  codegen-and-generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # --- Sui CLI (suiup) using cache to avoid re-downloading ---
      - name: Cache Sui / suiup
        id: cache-sui
        uses: actions/cache@v4
        with:
          path: |
            /home/runner/.local/bin
            /home/runner/.local/share
          key: suiup-${{ runner.os }}-sui-testnet-v1
          restore-keys: |
            suiup-${{ runner.os }}-sui-testnet-

      - name: Install Sui CLI
        if: steps.cache-sui.outputs.cache-hit != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sSfL https://raw.githubusercontent.com/MystenLabs/suiup/main/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          suiup install sui@testnet -y
          sui --version

      - name: Set Sui PATH
        run: |
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "PATH=$HOME/.local/bin:$PATH" >> $GITHUB_ENV
          sui --version

      # --- Publish Move to Testnet (optional: set vars.ENABLE_TESTNET_PUBLISH = 'true' and secrets.SUI_KEYSTORE_JSON)---
      - name: Publish Move package (testnet)
        id: publish
        if: ${{ vars.ENABLE_TESTNET_PUBLISH == 'true' }}
        env:
          SUI_KEYSTORE_JSON: ${{ secrets.SUI_KEYSTORE_JSON }}
        run: |
          mkdir -p "$HOME/.sui/sui_config"
          echo "$SUI_KEYSTORE_JSON" > "$HOME/.sui/sui_config/sui.keystore"
          sui client new-env --alias testnet --rpc https://fullnode.testnet.sui.io:443 2>/dev/null || true
          sui client default-env testnet 2>/dev/null || true
          cd move/hello_world
          publish_out=$(sui client publish --gas-budget 100000000 2>&1) || { echo "$publish_out"; exit 1; }
          echo "$publish_out" | tee publish.log
          PACKAGE_ID=$(grep -iE 'PackageID|package id|Published.*0x' publish.log | grep -oE '0x[a-fA-F0-9]{64}' | head -1)
          if [ -z "$PACKAGE_ID" ]; then
            PACKAGE_ID=$(grep -oE '0x[a-fA-F0-9]{64}' publish.log | head -1)
          fi
          echo "PACKAGE_ID=$PACKAGE_ID" >> $GITHUB_ENV
          echo "package_id=$PACKAGE_ID" >> $GITHUB_OUTPUT
          echo "✅ Published package: $PACKAGE_ID"

      - name: Set placeholder PACKAGE_ID when skip publish
        if: ${{ vars.ENABLE_TESTNET_PUBLISH != 'true' }}
        run: |
          echo "PACKAGE_ID=" >> $GITHUB_ENV
          echo "⚠️  Testnet publish disabled (set vars.ENABLE_TESTNET_PUBLISH to 'true' to enable)"

      # --- Node.js ---
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      # --- Step 1: Move Summary ---
      - name: Generate Move Summary
        run: |
          cd move/hello_world
          sui move summary
          echo "✅ Move summary generated"

      # --- Step 2: Codegen (TS Bindings) ---
      - name: Run Codegen
        run: |
          npx sui-ts-codegen generate
          echo "✅ TypeScript bindings generated"

      # --- Copy generated bindings into app to make frontend ./generated/... path correct ---
      - name: Copy generated bindings into app
        run: |
          mkdir -p src/app/src/generated
          cp -r src/generated/. src/app/src/generated/
          echo "✅ Bindings copied to src/app/src/generated"

      # --- Step 3: AI Frontend Generation ---
      - name: Generate Frontend with AI
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PACKAGE_ID: ${{ env.PACKAGE_ID }}
        run: |
          node scripts/generate-frontend.mjs
          echo "✅ Frontend generated"

      # --- Step 4: Commit & Push to codegen branch---
      - name: Commit generated files to codegen branch
        run: |
          git config user.name "codegen-bot"
          git config user.email "bot@codegen.ci"
          git checkout -B codegen
          git add src/
          git diff --staged --quiet || git commit -m "🤖 auto: codegen + frontend generation"
          git push -f origin codegen
          echo "✅ Pushed to branch codegen"

      - name: Create run branch (same content, for checkout & run)
        run: |
          git checkout -B run
          git push -f origin run
          echo "✅ Pushed to branch run (use this branch to run the app or create feature branches)"
